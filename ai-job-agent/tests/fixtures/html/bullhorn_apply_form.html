<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Apply - Backend Developer</title></head>
<body>
  <h1>Apply for this job</h1>
  <form id="application-form">
    <label for="full_name">Full name</label>
    <input id="full_name" name="full_name" type="text" required />
    <label for="email">E-Mail</label>
    <input id="email" name="email" type="email" required />
    <label for="phone">Phone number</label>
    <input id="phone" name="phone" type="tel" />
    <label for="portfolio">Portfolio / Website</label>
    <input id="portfolio" name="portfolio" type="url" />
    <label for="notes">Add anything you want to share (Optional)</label>
    <textarea id="notes" name="notes"></textarea>
    <input id="resume" name="resume" type="file" accept=".pdf,.doc,.docx" />
    <button type="submit">Apply for this job</button>
  </form>
</body>
</html>
