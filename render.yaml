# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo in Render, every push to master auto-deploys.

services:
  - type: web
    name: resume-agent
    runtime: docker
    plan: free
    repo: https://github.com/gallif1/Resume_Agent
    branch: master
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - Dockerfile
        - render.yaml
        - .github/**
        - ai-job-agent/**
        - resume-agent-web/**
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: HEADLESS
        value: true
      - key: APPLY_HEADLESS
        value: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: DRUSHIM_EMAIL
        sync: false
      - key: DRUSHIM_PASSWORD
        sync: false
