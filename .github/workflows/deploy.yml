name: Deploy Resume Agent to EC2

on:
  push:
    branches:
      - master     # אם הענף הראשי שלך נקרא main, שנה כאן ל-main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/resume-backend/Resume_Agent
            git pull origin master
            sudo DOCKER_BUILDKIT=0 docker build --no-cache -t resume_agent-resume-backend .
            sudo DOCKER_BUILDKIT=0 docker-compose up -d
            sleep 3
            sudo docker-compose ps
            sudo docker-compose logs --tail=80
            curl -sf http://127.0.0.1:8001/api/health || curl -sf http://127.0.0.1:8000/api/health || true
            sudo docker system prune -f
