name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-job-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-job-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run tests
        run: python -m pytest tests/ -q

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-agent-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: resume-agent-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-render:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::חסר סוד RENDER_DEPLOY_HOOK — דיפלוי אוטומטי דרך GitHub Actions לא רץ."
            echo "אם Auto-Deploy מופעל ב-Render על master, הפריסה תקרה משם."
            echo "אחרת: Render Dashboard → resume-agent → Manual Deploy."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Render deploy triggered."
